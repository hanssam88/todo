<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>TODO</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d1117;
        color: #e6edf3;
        padding: 0 16px 100px;
        line-height: 1.6;
        overflow-x: hidden;
      }

      /* Header */
      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: #0d1117;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0 8px;
        border-bottom: 1px solid #30363d;
      }
      .header h1 {
        font-size: 20px;
        font-weight: 600;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .sync-info {
        font-size: 12px;
        color: #8b949e;
      }
      .settings-btn {
        background: none;
        border: none;
        color: #8b949e;
        font-size: 18px;
        cursor: pointer;
        padding: 4px;
      }
      .settings-btn:hover {
        color: #e6edf3;
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 0;
        margin: 12px 0;
        background: #161b22;
        border-radius: 8px;
        overflow: hidden;
      }
      .tab {
        flex: 1;
        padding: 10px 0;
        text-align: center;
        font-size: 14px;
        font-weight: 500;
        color: #8b949e;
        background: transparent;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
      }
      .tab.active {
        color: #e6edf3;
        background: #30363d;
      }
      .tab-badge {
        display: inline-block;
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        margin-left: 4px;
        border-radius: 9px;
        font-size: 11px;
        line-height: 18px;
        background: #30363d;
        color: #8b949e;
        text-align: center;
      }
      .tab.active .tab-badge {
        background: #58a6ff;
        color: #fff;
      }

      /* Section */
      .section {
        margin-bottom: 16px;
      }
      .section-title {
        font-size: 15px;
        font-weight: 600;
        color: #58a6ff;
        margin-bottom: 8px;
        padding: 4px 8px;
        background: #161b22;
        border-radius: 6px;
      }

      /* Item */
      .item {
        padding: 10px 12px;
        border-bottom: 1px solid #21262d;
        transition: background 0.15s;
      }
      .item:last-child {
        border-bottom: none;
      }
      .item:active {
        background: rgba(88, 166, 255, 0.06);
      }
      .item-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      .checkbox {
        width: 22px;
        height: 22px;
        border: 2px solid #30363d;
        border-radius: 6px;
        flex-shrink: 0;
        margin-top: 1px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        color: transparent;
        font-size: 14px;
      }
      .checkbox:active {
        transform: scale(0.9);
      }
      .checkbox.done {
        background: #238636;
        border-color: #238636;
        color: #fff;
      }
      .item-content {
        flex: 1;
        min-width: 0;
        cursor: pointer;
      }
      .item-title {
        font-size: 14px;
        word-break: break-word;
      }
      .item-meta {
        font-size: 12px;
        color: #8b949e;
        margin-top: 3px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .tag {
        display: inline-block;
        padding: 0 6px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 500;
      }
      .tag-id {
        color: #8b949e;
      }
      .tag-category {
        background: #1f6feb;
        color: #fff;
      }
      .tag-high {
        background: #da3633;
        color: #fff;
      }
      .tag-mid {
        background: #d29922;
        color: #fff;
      }
      .tag-low {
        background: #30363d;
        color: #8b949e;
      }
      .dday {
        color: #f85149;
        font-weight: 600;
      }
      .dday.safe {
        color: #3fb950;
      }
      .dday.near {
        color: #d29922;
      }
      .overdue {
        background: rgba(248, 81, 73, 0.06);
      }

      /* Detail panel */
      .item-detail {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 0.25s ease,
          padding 0.25s ease;
        padding: 0 0 0 32px;
      }
      .item-detail.open {
        max-height: 600px;
        padding: 8px 0 4px 32px;
      }
      .blocker-detail.detail-value {
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.5;
      }
      .detail-row {
        display: flex;
        gap: 8px;
        font-size: 13px;
        padding: 3px 0;
        color: #8b949e;
      }
      .detail-label {
        color: #58a6ff;
        min-width: 52px;
      }
      .detail-value {
        color: #e6edf3;
        flex: 1;
        min-width: 0;
        overflow-wrap: break-word;
        word-break: break-word;
      }
      .blocker-detail {
        color: #f0883e;
      }

      /* Bottom sheet */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 100;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
      }
      .overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      .bottom-sheet {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #161b22;
        border-radius: 16px 16px 0 0;
        z-index: 101;
        transform: translateY(100%);
        transition: transform 0.25s ease;
        padding: 8px 0 env(safe-area-inset-bottom, 20px);
      }
      .bottom-sheet.show {
        transform: translateY(0);
      }
      .sheet-handle {
        width: 36px;
        height: 4px;
        background: #30363d;
        border-radius: 2px;
        margin: 8px auto 12px;
      }
      .sheet-title {
        font-size: 13px;
        color: #8b949e;
        padding: 0 20px 8px;
        border-bottom: 1px solid #21262d;
      }
      .sheet-action {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        font-size: 15px;
        color: #e6edf3;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        cursor: pointer;
      }
      .sheet-action:active {
        background: #21262d;
      }
      .sheet-action.danger {
        color: #f85149;
      }
      .sheet-action .icon {
        font-size: 18px;
        width: 24px;
        text-align: center;
      }

      /* Urgency picker */
      .urgency-picker {
        display: none;
        padding: 8px 20px;
        gap: 8px;
      }
      .urgency-picker.show {
        display: flex;
      }
      .urgency-opt {
        flex: 1;
        padding: 10px;
        text-align: center;
        border-radius: 8px;
        border: 2px solid #30363d;
        background: none;
        color: #e6edf3;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .urgency-opt:active {
        opacity: 0.7;
      }
      .urgency-opt[data-u="상"] {
        border-color: #da3633;
        color: #da3633;
      }
      .urgency-opt[data-u="중"] {
        border-color: #d29922;
        color: #d29922;
      }
      .urgency-opt[data-u="하"] {
        border-color: #8b949e;
        color: #8b949e;
      }
      .urgency-opt.selected {
        color: #fff !important;
      }
      .urgency-opt[data-u="상"].selected {
        background: #da3633;
      }
      .urgency-opt[data-u="중"].selected {
        background: #d29922;
      }
      .urgency-opt[data-u="하"].selected {
        background: #30363d;
      }

      /* Modal */
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal.show {
        display: flex;
      }
      .modal-box {
        background: #161b22;
        border-radius: 12px;
        width: 100%;
        max-width: 360px;
        padding: 20px;
      }
      .modal-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      .modal-input {
        width: 100%;
        padding: 10px 12px;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        color: #e6edf3;
        font-size: 14px;
        margin-bottom: 12px;
      }
      .modal-input:focus {
        outline: none;
        border-color: #58a6ff;
      }
      .modal-hint {
        font-size: 12px;
        color: #8b949e;
        margin-bottom: 16px;
        line-height: 1.5;
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .modal-btn {
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        border: none;
      }
      .modal-btn.cancel {
        background: #21262d;
        color: #e6edf3;
      }
      .modal-btn.primary {
        background: #238636;
        color: #fff;
      }
      .modal-btn:active {
        opacity: 0.8;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #30363d;
        color: #e6edf3;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 13px;
        z-index: 300;
        opacity: 0;
        transition: all 0.3s;
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .toast.error {
        background: #da3633;
      }
      .toast.success {
        background: #238636;
      }

      /* Refresh */
      .refresh-btn {
        position: fixed;
        bottom: max(20px, env(safe-area-inset-bottom, 20px));
        right: 20px;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: #238636;
        border: none;
        color: #fff;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
      }
      .refresh-btn:active {
        background: #2ea043;
      }
      .refresh-btn.loading {
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .empty {
        color: #8b949e;
        text-align: center;
        padding: 40px;
        font-size: 14px;
      }

      /* Token status dot */
      .token-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        display: inline-block;
        margin-left: 4px;
      }
      .token-dot.ok {
        background: #3fb950;
      }
      .token-dot.none {
        background: #f85149;
      }

      /* Loading */
      .item.saving {
        opacity: 0.5;
        pointer-events: none;
      }

      /* Filter bar */
      .filter-bar {
        display: none;
        flex-direction: column;
        gap: 8px;
        padding: 8px 0;
        border-bottom: 1px solid #21262d;
        margin-bottom: 8px;
      }
      .filter-bar.show {
        display: flex;
      }
      .filter-search {
        width: 100%;
        padding: 8px 12px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        color: #e6edf3;
        font-size: 14px;
      }
      .filter-search:focus {
        outline: none;
        border-color: #58a6ff;
      }
      .filter-search::placeholder {
        color: #484f58;
      }
      .filter-chips {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .filter-chip {
        padding: 4px 10px;
        border-radius: 14px;
        font-size: 12px;
        font-weight: 500;
        border: 1px solid #30363d;
        background: transparent;
        color: #8b949e;
        cursor: pointer;
        white-space: nowrap;
      }
      .filter-chip.active {
        border-color: #58a6ff;
        color: #58a6ff;
        background: rgba(88, 166, 255, 0.1);
      }
      .filter-toggle {
        background: none;
        border: none;
        color: #8b949e;
        font-size: 16px;
        cursor: pointer;
        padding: 4px;
      }
      .filter-toggle:hover {
        color: #e6edf3;
      }
      .filter-toggle.active {
        color: #58a6ff;
      }
      .filter-count {
        font-size: 12px;
        color: #8b949e;
        padding: 4px 0;
        text-align: center;
      }

      /* Shared form styles (add + edit modals) */
      .form-group {
        margin-bottom: 12px;
      }
      .form-label {
        font-size: 12px;
        color: #8b949e;
        margin-bottom: 4px;
        display: block;
      }
      .form-select {
        width: 100%;
        padding: 10px 12px;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        color: #e6edf3;
        font-size: 14px;
        appearance: none;
        -webkit-appearance: none;
      }
      .form-select:focus {
        outline: none;
        border-color: #58a6ff;
      }
      .urgency-group {
        display: flex;
        gap: 8px;
      }
      .urgency-btn-form {
        flex: 1;
        padding: 8px;
        text-align: center;
        border-radius: 8px;
        border: 2px solid #30363d;
        background: none;
        color: #8b949e;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .urgency-btn-form[data-u="상"] {
        border-color: #da3633;
        color: #da3633;
      }
      .urgency-btn-form[data-u="중"] {
        border-color: #d29922;
        color: #d29922;
      }
      .urgency-btn-form[data-u="하"] {
        border-color: #8b949e;
      }
      .urgency-btn-form.selected {
        color: #fff !important;
      }
      .urgency-btn-form[data-u="상"].selected {
        background: #da3633;
      }
      .urgency-btn-form[data-u="중"].selected {
        background: #d29922;
      }
      .urgency-btn-form[data-u="하"].selected {
        background: #30363d;
      }

      /* FAB */
      .add-fab {
        position: fixed;
        bottom: max(20px, env(safe-area-inset-bottom, 20px));
        left: 20px;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: #58a6ff;
        border: none;
        color: #fff;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        line-height: 1;
      }
      .add-fab:active {
        background: #388bfd;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>TODO</h1>
      <div class="header-right">
        <span class="sync-info" id="syncInfo">loading...</span>
        <button
          class="filter-toggle"
          id="filterToggle"
          onclick="toggleFilterBar()"
          title="필터"
        >
          &#x1F50D;
        </button>
        <button
          class="settings-btn"
          onclick="showTokenModal()"
          title="Settings"
        >
          &#9881;<span class="token-dot" id="tokenDot"></span>
        </button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabActive" onclick="switchTab('active')">
        활성 <span class="tab-badge" id="badgeActive">0</span>
      </button>
      <button class="tab" id="tabArchive" onclick="switchTab('archive')">
        완료 <span class="tab-badge" id="badgeArchive">0</span>
      </button>
    </div>

    <div class="filter-bar" id="filterBar">
      <input
        class="filter-search"
        id="filterSearch"
        type="text"
        placeholder="검색어 입력..."
        oninput="applyFilters()"
      />
      <div class="filter-chips" id="filterChips">
        <button
          class="filter-chip"
          data-type="urgency"
          data-value="상"
          onclick="toggleChip(this)"
        >
          상
        </button>
        <button
          class="filter-chip"
          data-type="urgency"
          data-value="중"
          onclick="toggleChip(this)"
        >
          중
        </button>
        <button
          class="filter-chip"
          data-type="urgency"
          data-value="하"
          onclick="toggleChip(this)"
        >
          하
        </button>
        <span style="width: 1px; background: #30363d; margin: 0 2px"></span>
        <button
          class="filter-chip"
          data-type="dday"
          data-value="overdue"
          onclick="toggleChip(this)"
        >
          지연
        </button>
        <button
          class="filter-chip"
          data-type="dday"
          data-value="week"
          onclick="toggleChip(this)"
        >
          이번주
        </button>
        <button
          class="filter-chip"
          data-type="dday"
          data-value="backlog"
          onclick="toggleChip(this)"
        >
          백로그
        </button>
      </div>
      <div class="filter-chips" id="sectionChips"></div>
      <div class="filter-count" id="filterCount" style="display: none"></div>
    </div>

    <div id="content"><div class="empty">loading...</div></div>

    <button class="refresh-btn" id="refreshBtn" onclick="load()">
      &#x21bb;
    </button>
    <button class="add-fab" id="addFab" onclick="showAddModal()">+</button>

    <!-- Bottom Sheet -->
    <div class="overlay" id="overlay" onclick="closeSheet()"></div>
    <div class="bottom-sheet" id="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="sheetTitle">T-001</div>
      <button class="sheet-action" onclick="doAction('complete')">
        <span class="icon">&#10003;</span> 완료 처리
      </button>
      <button class="sheet-action" onclick="openEditModal()">
        <span class="icon">&#9998;</span> 편집
      </button>
      <button class="sheet-action" onclick="toggleUrgencyPicker()">
        <span class="icon">&#9650;</span> 긴급도 변경
      </button>
      <div class="urgency-picker" id="urgencyPicker">
        <button
          class="urgency-opt"
          data-u="상"
          onclick="doAction('urgency', '상')"
        >
          상
        </button>
        <button
          class="urgency-opt"
          data-u="중"
          onclick="doAction('urgency', '중')"
        >
          중
        </button>
        <button
          class="urgency-opt"
          data-u="하"
          onclick="doAction('urgency', '하')"
        >
          하
        </button>
      </div>
      <button class="sheet-action danger" onclick="doAction('cancel')">
        <span class="icon">&#10005;</span> 취소 (삭제)
      </button>
    </div>

    <!-- Token Modal -->
    <div class="modal" id="tokenModal">
      <div class="modal-box">
        <div class="modal-title">GitHub Token 설정</div>
        <div class="modal-hint">
          GitHub &gt; Settings &gt; Developer settings &gt; Personal access
          tokens &gt; Fine-grained tokens<br />
          Repository: <b>hanssam88/todo</b><br />
          Permission: <b>Contents (Read and write)</b>
        </div>
        <input
          class="modal-input"
          id="tokenInput"
          type="password"
          placeholder="github_pat_..."
        />
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="closeTokenModal()">
            취소
          </button>
          <button class="modal-btn primary" onclick="saveToken()">저장</button>
        </div>
      </div>
    </div>

    <!-- Add Modal -->
    <div class="modal" id="addModal">
      <div class="modal-box" style="max-width: 400px">
        <div class="modal-title">새 TODO 추가</div>
        <div class="form-group">
          <label class="form-label">제목 *</label>
          <input
            class="modal-input"
            id="addTitle"
            type="text"
            placeholder="동사로 시작 (예: 확인하기, 전달하기)"
          />
        </div>
        <div class="form-group">
          <label class="form-label">섹션 *</label>
          <select class="form-select" id="addSection"></select>
        </div>
        <div class="form-group">
          <label class="form-label">태그 *</label>
          <select class="form-select" id="addTag"></select>
        </div>
        <div class="form-group">
          <label class="form-label">긴급도 *</label>
          <div class="urgency-group">
            <button
              class="urgency-btn-form"
              data-u="상"
              onclick="selectAddUrgency(this)"
            >
              상
            </button>
            <button
              class="urgency-btn-form selected"
              data-u="중"
              onclick="selectAddUrgency(this)"
            >
              중
            </button>
            <button
              class="urgency-btn-form"
              data-u="하"
              onclick="selectAddUrgency(this)"
            >
              하
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">기한</label>
          <input class="modal-input" id="addDate" type="date" />
        </div>
        <div class="form-group">
          <label class="form-label">블로커 (선택)</label>
          <input
            class="modal-input"
            id="addBlocker"
            type="text"

          <button class="modal-btn cancel" onclick="closeAddModal()">

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
      <div class="modal-box" style="max-width: 400px">
        <div class="modal-title">
          TODO 편집
          <span id="editId" style="color: #8b949e; font-size: 13px"></span>

        <div class="form-group">

          <label class="form-label">태그</label>
          <select class="form-select" id="editTag"></select>

        <div class="form-group">
          <label class="form-label">긴급도</label>
          <div class="urgency-group">
            <button

              상
            </button>
            <button
              class="urgency-btn-form"

              onclick="selectEditUrgency(this)"
            >
              중
            </button>

              data-u="하"
              onclick="selectEditUrgency(this)"
            >
              하
            </button>
          </div>

          <label class="form-label">기한</label>
          <input class="modal-input" id="editDate" type="date" />

            <button
              class="filter-chip"
              type="button"
              onclick="
                document.getElementById('editDate').value = '';
                this.blur();
              "
              style="font-size: 11px"
            >
              기한 없음 (백로그)
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">블로커</label>
          <textarea
            class="modal-input"
            id="editBlocker"
            rows="3"
            placeholder="대기 사유, 의존성 등"
            style="resize: vertical"
          ></textarea>

        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="closeEditModal()">
            취소
          </button>
          <button
            class="modal-btn primary"

            저장
          </button>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
      const OWNER = "hanssam88";
      const REPO = "todo";
      const ACTIVE_PATH = "todo_active.md";
      const ARCHIVE_PATH = "todo_archive.md";
      const API_BASE = `https://api.github.com/repos/${OWNER}/${REPO}/contents/`;
      const AUTO_REFRESH = 120000;

      let currentTab = "active";
      let activeData = { raw: "", sections: [], count: 0 };
      let archiveData = { raw: "", sections: [], count: 0 };
      let selectedItem = null;
      let filters = { search: "", urgency: null, dday: null, section: null };

      // Filter
      function toggleFilterBar() {
        const bar = document.getElementById("filterBar");
        const btn = document.getElementById("filterToggle");
        bar.classList.toggle("show");
        btn.classList.toggle("active");
        if (bar.classList.contains("show")) {
          document.getElementById("filterSearch").focus();
          buildSectionChips();
        }
      }

      function buildSectionChips() {
        const data = currentTab === "active" ? activeData : archiveData;
        const el = document.getElementById("sectionChips");
        el.innerHTML = data.sections
          .map(
            (s) =>
              `<button class="filter-chip${filters.section === s.title ? " active" : ""}" data-type="section" data-value="${esc(s.title)}" onclick="toggleChip(this)">${esc(s.title)}</button>`,
          )
          .join("");
      }

      function toggleChip(el) {
        const type = el.dataset.type;
        document
          .querySelectorAll(`.filter-chip[data-type="${type}"]`)
          .forEach((c) => {
            if (c !== el) c.classList.remove("active");
          });
        el.classList.toggle("active");
        filters[type] = el.classList.contains("active")
          ? el.dataset.value
          : null;
        applyFilters();
      }

      function applyFilters() {
        filters.search = document
          .getElementById("filterSearch")
          .value.trim()
          .toLowerCase();
        renderCurrent();
      }

      function filterItems(items) {
        return items.filter((item) => {
          if (filters.search) {
            const text = (
              item.title +
              " " +
              item.id +
              " " +
              (item.blocker || "") +
              " " +
              (item.tag || "")
            ).toLowerCase();
            if (!text.includes(filters.search)) return false;
          }
          if (filters.urgency && item.urgency !== filters.urgency) return false;
          if (filters.dday) {
            const d = calcDday(item.date);
            if (filters.dday === "overdue" && (d === null || d >= 0))
              return false;
            if (filters.dday === "week" && (d === null || d < 0 || d > 7))
              return false;
            if (filters.dday === "backlog" && item.date !== "-") return false;
          }
          return true;
        });
      }

      function hasActiveFilters() {
        return (
          filters.search || filters.urgency || filters.dday || filters.section
        );
      }

      // Add/Edit shared
      const KNOWN_TAGS = [
        "#운영",
        "#개발",
        "#법무",
        "#영업",
        "#총무",
        "#인프라",
      ];
      const DEFAULT_SECTIONS = ["아고다", "씨트립", "공통"];

      function getSections() {
        const fromData = activeData.sections.map((s) => s.title);
        const all = [...DEFAULT_SECTIONS];
        fromData.forEach((s) => {
          if (!all.includes(s)) all.push(s);
        });
        return all;
      }

      function populateFormSelects(sectionSelectId, tagSelectId) {
        const sectionEl = document.getElementById(sectionSelectId);
        const tagEl = document.getElementById(tagSelectId);
        sectionEl.innerHTML = getSections()
          .map((s) => `<option value="${esc(s)}">${esc(s)}</option>`)
          .join("");
        tagEl.innerHTML = KNOWN_TAGS.map(
          (t) => `<option value="${t}">${t}</option>`,
        ).join("");
      }

      // Add modal
      let addUrgency = "중";

      function showAddModal() {
        if (!hasToken()) {
          showTokenModal();
          toast("먼저 GitHub Token을 설정하세요", "error");
          return;
        }
        populateFormSelects("addSection", "addTag");
        document.getElementById("addTitle").value = "";
        document.getElementById("addSection").value = "공통";
        document.getElementById("addTag").value = "#운영";
        document.getElementById("addDate").value = "";
        document.getElementById("addBlocker").value = "";
        addUrgency = "중";
        document
          .querySelectorAll("#addModal .urgency-btn-form")
          .forEach((b) => {
            b.classList.toggle("selected", b.dataset.u === "중");
          });
        document.getElementById("addModal").classList.add("show");
        document.getElementById("addTitle").focus();
      }

      function closeAddModal() {
        document.getElementById("addModal").classList.remove("show");
      }

      function selectAddUrgency(el) {
        addUrgency = el.dataset.u;
        document
          .querySelectorAll("#addModal .urgency-btn-form")
          .forEach((b) => {
            b.classList.toggle("selected", b === el);
          });
      }

      async function submitAdd() {
        const title = document.getElementById("addTitle").value.trim();
        if (!title) {
          toast("제목을 입력하세요", "error");
          return;
        }

        const section = document.getElementById("addSection").value;
        const tag = document.getElementById("addTag").value;
        const dateVal = document.getElementById("addDate").value || "-";
        const blocker = document.getElementById("addBlocker").value.trim();
        const btn = document.getElementById("addSubmitBtn");
        btn.disabled = true;
        btn.textContent = "추가 중...";

        try {
          const file = await getFile(ACTIVE_PATH);
          let content = decodeContent(file.content);

          const idMatch = content.match(/<!-- last_id: (\d+) -->/);
          const lastId = idMatch ? parseInt(idMatch[1]) : 0;
          const newId = lastId + 1;
          const newIdStr = `T-${String(newId).padStart(3, "0")}`;

          content = content.replace(
            /<!-- last_id: \d+ -->/,
            `<!-- last_id: ${newId} -->`,
          );

          let line = `- [ ] \`${newIdStr}\` \`${tag}\` \`${addUrgency}\` \`${dateVal}\` ${title}`;
          if (blocker) line += ` \u2014 ${blocker}`;

          const sectionHeader = `## ${section}`;
          const lines = content.split("\n");

          if (content.includes(sectionHeader)) {
            let insertIdx = -1;
            let inSection = false;
            for (let i = 0; i < lines.length; i++) {
              if (lines[i].startsWith(sectionHeader)) {
                inSection = true;
                insertIdx = i + 1;
                continue;
              }
              if (inSection) {
                if (lines[i].startsWith("## ") || lines[i].startsWith("# "))
                  break;
                if (lines[i].startsWith("- [")) insertIdx = i + 1;
              }
            }
            lines.splice(insertIdx, 0, line);
            content = lines.join("\n");
          } else {
            content =
              content.trimEnd() + "\n\n" + sectionHeader + "\n\n" + line + "\n";
          }

          await updateFile(
            ACTIVE_PATH,
            content,
            file.sha,
            `add: ${newIdStr} ${title}`,
          );
          closeAddModal();
          toast(`${newIdStr} 추가됨`, "success");
          await load();
        } catch (err) {
          toast("오류: " + err.message, "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "추가";
        }
      }

      // Edit modal
      let editUrgency = "중";
      let editItemId = null;

      function openEditModal() {
        const item = findItem(selectedItem);
        if (!item) {
          toast("항목을 찾을 수 없습니다", "error");
          return;
        }
        closeSheet();

        editItemId = item.id;
        editUrgency = item.urgency;

        populateFormSelects("editSection", "editTag");

        document.getElementById("editId").textContent = item.id;
        document.getElementById("editTitle").value = item.title;
        document.getElementById("editTag").value = item.tag || "#운영";
        document.getElementById("editDate").value =
          item.date === "-" ? "" : item.date;
        document.getElementById("editBlocker").value = item.blocker || "";

        for (const s of activeData.sections) {
          if (s.items.some((i) => i.id === item.id)) {
            document.getElementById("editSection").value = s.title;
            break;
          }
        }

        document
          .querySelectorAll("#editModal .urgency-btn-form")
          .forEach((b) => {
            b.classList.toggle("selected", b.dataset.u === item.urgency);
          });

        document.getElementById("editModal").classList.add("show");
        document.getElementById("editTitle").focus();
      }

      function closeEditModal() {
        document.getElementById("editModal").classList.remove("show");
        editItemId = null;
      }

      function selectEditUrgency(el) {
        editUrgency = el.dataset.u;
        document
          .querySelectorAll("#editModal .urgency-btn-form")
          .forEach((b) => {
            b.classList.toggle("selected", b === el);
          });
      }

      async function submitEdit() {
        if (!editItemId) return;
        const title = document.getElementById("editTitle").value.trim();
        if (!title) {
          toast("제목을 입력하세요", "error");
          return;
        }

        const newSection = document.getElementById("editSection").value;
        const tag = document.getElementById("editTag").value;
        const dateVal = document.getElementById("editDate").value || "-";
        const blocker = document.getElementById("editBlocker").value.trim();
        const btn = document.getElementById("editSubmitBtn");
        btn.disabled = true;
        btn.textContent = "저장 중...";

        try {
          const file = await getFile(ACTIVE_PATH);
          let content = decodeContent(file.content);
          const lines = content.split("\n");

          let newLine = `- [ ] \`${editItemId}\` \`${tag}\` \`${editUrgency}\` \`${dateVal}\` ${title}`;
          if (blocker) newLine += ` \u2014 ${blocker}`;

          let oldSection = null;
          let removedIdx = -1;
          let currentSection = null;
          for (let i = 0; i < lines.length; i++) {
            const sm = lines[i].match(/^## (.+)/);
            if (sm) currentSection = sm[1];
            if (
              lines[i].includes("`" + editItemId + "`") &&
              lines[i].startsWith("- [")
            ) {
              oldSection = currentSection;
              removedIdx = i;
              break;
            }
          }

          if (removedIdx === -1) throw new Error("항목을 찾을 수 없습니다");

          if (oldSection === newSection) {
            lines[removedIdx] = newLine;
          } else {
            lines.splice(removedIdx, 1);
            const sectionHeader = `## ${newSection}`;
            let insertIdx = -1;
            let inSection = false;
            for (let i = 0; i < lines.length; i++) {
              if (lines[i].startsWith(sectionHeader)) {
                inSection = true;
                insertIdx = i + 1;
                continue;
              }
              if (inSection) {
                if (lines[i].startsWith("## ") || lines[i].startsWith("# "))
                  break;
                if (lines[i].startsWith("- [")) insertIdx = i + 1;
              }
            }
            if (insertIdx === -1) {
              lines.push("", sectionHeader, "", newLine);
            } else {
              lines.splice(insertIdx, 0, newLine);
            }
          }

          content = cleanEmptySections(lines.join("\n"));
          await updateFile(
            ACTIVE_PATH,
            content,
            file.sha,
            `edit: ${editItemId} ${title}`,
          );
          closeEditModal();
          toast(`${editItemId} 수정됨`, "success");
          await load();
        } catch (err) {
          toast("오류: " + err.message, "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "저장";
        }
      }

      // Token
      function getToken() {
        return localStorage.getItem("gh_todo_token") || "";
      }
      function hasToken() {
        return !!getToken();
      }

      function updateTokenDot() {
        const dot = document.getElementById("tokenDot");
        dot.className = "token-dot " + (hasToken() ? "ok" : "none");
      }

      function showTokenModal() {
        document.getElementById("tokenInput").value = getToken();
        document.getElementById("tokenModal").classList.add("show");
      }

      function closeTokenModal() {
        document.getElementById("tokenModal").classList.remove("show");
      }

      async function saveToken() {
        const v = document.getElementById("tokenInput").value.trim();
        if (!v) {
          localStorage.removeItem("gh_todo_token");
          closeTokenModal();
          updateTokenDot();
          toast("Token 삭제됨", "success");
          return;
        }
        toast("토큰 검증 중...", "");
        const prefix = v.startsWith("github_pat_") ? "Bearer" : "token";
        try {
          // 1. 읽기 권한 확인
          const res = await fetch(API_BASE + ACTIVE_PATH, {
            headers: {
              Authorization: `${prefix} ${v}`,
              Accept: "application/vnd.github.v3+json",
            },
          });
          if (res.status === 401) {
            toast("토큰이 유효하지 않습니다", "error");
            return;
          }
          if (res.status === 403) {
            toast("레포 접근 권한 없음", "error");
            return;
          }
          if (res.status === 404) {
            toast(
              "레포를 찾을 수 없음 — 토큰에 hanssam88/todo 권한 필요",
              "error",
            );
            return;
          }
          const data = await res.json();
          if (!data.sha) {
            toast("예상치 못한 응답", "error");
            return;
          }

          // 2. 쓰기 권한 확인 (repo collaborator permission 체크, 커밋 안 만듦)
          const permRes = await fetch(
            `https://api.github.com/repos/${OWNER}/${REPO}`,
            {
              headers: {
                Authorization: `${prefix} ${v}`,
                Accept: "application/vnd.github.v3+json",
              },
            },
          );
          if (permRes.ok) {
            const repo = await permRes.json();
            const canWrite =
              repo.permissions &&
              (repo.permissions.push || repo.permissions.admin);
            if (!canWrite) {
              toast("쓰기 권한 없음: Contents → Read and write 필요", "error");
              return;
            }
          } else {
            toast("권한 확인 실패: " + permRes.status, "error");
            return;
          }
          localStorage.setItem("gh_todo_token", v);
          closeTokenModal();
          updateTokenDot();
          toast("Token 저장 + 읽기/쓰기 권한 확인 완료 ✓", "success");
          load();
        } catch (e) {
          toast("검증 실패: " + e.message, "error");
        }
      }

      // Toast
      function toast(msg, type) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "toast " + (type || "") + " show";
        setTimeout(() => el.classList.remove("show"), 2500);
      }

      // Tabs
      function switchTab(tab) {
        currentTab = tab;
        document
          .getElementById("tabActive")
          .classList.toggle("active", tab === "active");
        document
          .getElementById("tabArchive")
          .classList.toggle("active", tab === "archive");
        if (document.getElementById("filterBar").classList.contains("show")) {
          buildSectionChips();
        }
        renderCurrent();
      }

      // Parse
      function parseMd(text) {
        const sections = [];
        let current = null;
        let count = 0;
        for (const line of text.split("\n")) {
          const sm = line.match(/^## (.+)/);
          if (sm) {
            current = { title: sm[1], items: [] };
            sections.push(current);
            continue;
          }
          if (!current) continue;
          // 4-field: id, tag, urgency, date (active format)
          let im = line.match(
            /^- \[([ x])\] `(T-\d+)` `(#\S+)` `([상중하])` `(\S+)` (.+)/,
          );
          if (im) {
            const [, done, id, tag, urgency, date, rest] = im;
            const bm = rest.match(/^(.+?)\s*\u2014\s*(.+)$/);
            const title = bm ? bm[1].trim() : rest.trim();
            const blocker = bm ? bm[2].trim() : null;
            current.items.push({
              done: done === "x",
              id,
              tag,
              urgency,
              date,
              title,
              blocker,
              raw: line,
            });
            count++;
            continue;
          }
          // 3-field fallback: id, urgency, date (archive format)
          im = line.match(/^- \[([ x])\] `(T-\d+)` `([상중하])` `(\S+)` (.+)/);
          if (im) {
            const [, done, id, urgency, date, rest] = im;
            const bm = rest.match(/^(.+?)\s*\u2014\s*(.+)$/);
            const title = bm ? bm[1].trim() : rest.trim();
            const blocker = bm ? bm[2].trim() : null;
            current.items.push({
              done: done === "x",
              id,
              tag: null,
              urgency,
              date,
              title,
              blocker,
              raw: line,
            });
            count++;
          }
        }
        return { sections: sections.filter((s) => s.items.length > 0), count };
      }

      // D-day
      function calcDday(ds) {
        if (!ds || ds === "-") return null;
        const t = new Date();
        t.setHours(0, 0, 0, 0);
        const d = new Date(ds);
        d.setHours(0, 0, 0, 0);
        return Math.round((d - t) / 86400000);
      }
      function ddayText(d) {
        if (d === null) return "";
        if (d === 0) return "D-Day";
        return d < 0 ? `D+${Math.abs(d)}` : `D-${d}`;
      }
      function ddayClass(d) {
        if (d === null) return "";
        if (d <= 0) return "dday";
        if (d <= 3) return "dday near";
        return "dday safe";
      }
      function urgencyTag(u) {
        return (
          { "\uC0C1": "tag-high", "\uC911": "tag-mid", "\uD558": "tag-low" }[
            u
          ] || "tag-low"
        );
      }
      function urgencyLabel(u) {
        return { "\uC0C1": "긴급", "\uC911": "보통", "\uD558": "낮음" }[u] || u;
      }
      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      // Render
      function renderSections(sections, isArchive) {
        if (!sections.length)
          return `<div class="empty">${isArchive ? "완료된 항목이 없습니다" : "할 일이 없습니다"}</div>`;

        return sections
          .map((s) => {
            const items = s.items
              .map((item) => {
                const d = calcDday(item.date);
                const dateDisplay =
                  item.date === "-" ? "backlog" : item.date.slice(5);
                const isOverdue = d !== null && d < 0 && !item.done;

                return `<div class="item${isOverdue ? " overdue" : ""}" data-id="${item.id}">
        <div class="item-row">
          <div class="checkbox${item.done ? " done" : ""}" onclick="onCheckbox(event,'${item.id}')">${item.done ? "&#10003;" : ""}</div>
          <div class="item-content" onclick="toggleDetail('${item.id}')">
            <div class="item-title">${esc(item.title)}</div>
            <div class="item-meta">
              <span class="tag tag-id">${item.id}</span>
              ${item.tag ? `<span class="tag tag-category">${esc(item.tag)}</span>` : ""}
              <span class="tag ${urgencyTag(item.urgency)}">${esc(item.urgency)}</span>
              <span>${dateDisplay}</span>
              ${d !== null ? `<span class="${ddayClass(d)}">${ddayText(d)}</span>` : ""}
            </div>
          </div>
        </div>
        <div class="item-detail" id="detail-${item.id}">
          <div class="detail-row"><span class="detail-label">ID</span><span class="detail-value">${item.id}</span></div>
          ${item.tag ? `<div class="detail-row"><span class="detail-label">태그</span><span class="detail-value">${esc(item.tag)}</span></div>` : ""}
          <div class="detail-row"><span class="detail-label">긴급도</span><span class="detail-value">${urgencyLabel(item.urgency)}</span></div>
          <div class="detail-row"><span class="detail-label">기한</span><span class="detail-value">${item.date === "-" ? "백로그" : item.date}${d !== null ? ` (${ddayText(d)})` : ""}</span></div>
          <div class="detail-row"><span class="detail-label">섹션</span><span class="detail-value">${esc(s.title)}</span></div>
          ${item.blocker ? `<div class="detail-row"><span class="detail-label blocker-detail">블로커</span><span class="detail-value blocker-detail">${esc(item.blocker)}</span></div>` : ""}
        </div>
      </div>`;
              })
              .join("");

            return `<div class="section"><div class="section-title">${esc(s.title)}</div>${items}</div>`;
          })
          .join("");
      }

      function renderCurrent() {
        const data = currentTab === "active" ? activeData : archiveData;
        let sections = data.sections;

        if (hasActiveFilters()) {
          sections = sections
            .filter((s) => !filters.section || s.title === filters.section)
            .map((s) => ({ ...s, items: filterItems(s.items) }))
            .filter((s) => s.items.length > 0);
          const total = sections.reduce((sum, s) => sum + s.items.length, 0);
          const countEl = document.getElementById("filterCount");
          countEl.style.display = "block";
          countEl.textContent = `${total}건 표시 중`;
        } else {
          const countEl = document.getElementById("filterCount");
          if (countEl) countEl.style.display = "none";
        }

        document.getElementById("content").innerHTML = renderSections(
          sections,
          currentTab === "archive",
        );
      }

      // Detail toggle
      function toggleDetail(id) {
        const el = document.getElementById("detail-" + id);
        if (el) el.classList.toggle("open");
      }

      // Checkbox → action sheet
      function onCheckbox(e, id) {
        e.stopPropagation();
        if (!hasToken()) {
          showTokenModal();
          toast("먼저 GitHub Token을 설정하세요", "error");
          return;
        }
        if (currentTab === "archive") return;
        selectedItem = id;
        document.getElementById("sheetTitle").textContent = id;
        document.getElementById("urgencyPicker").classList.remove("show");
        document.getElementById("overlay").classList.add("show");
        document.getElementById("sheet").classList.add("show");
      }

      function closeSheet() {
        document.getElementById("overlay").classList.remove("show");
        document.getElementById("sheet").classList.remove("show");
        selectedItem = null;
      }

      function toggleUrgencyPicker() {
        const p = document.getElementById("urgencyPicker");
        p.classList.toggle("show");
        if (p.classList.contains("show")) {
          const item = findItem(selectedItem);
          document.querySelectorAll(".urgency-opt").forEach((b) => {
            b.classList.toggle(
              "selected",
              item && b.dataset.u === item.urgency,
            );
          });
        }
      }

      function findItem(id) {
        for (const s of activeData.sections)
          for (const item of s.items) if (item.id === id) return item;
        return null;
      }

      // GitHub API — auth prefix auto-detect (fine-grained=Bearer, classic=token)
      function authHeader() {
        const t = getToken();
        if (!t) throw new Error("GitHub Token을 먼저 설정하세요");
        const prefix = t.startsWith("github_pat_") ? "Bearer" : "token";
        return `${prefix} ${t}`;
      }

      async function getFile(path) {
        const res = await fetch(API_BASE + path, {
          headers: {
            Authorization: authHeader(),
            Accept: "application/vnd.github.v3+json",
          },
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          if (res.status === 401)
            throw new Error("토큰이 만료되었거나 유효하지 않습니다");
          if (res.status === 403)
            throw new Error(
              "권한 부족: Contents → Read and write 필요\n" +
                (err.message || ""),
            );
          throw new Error(err.message || "API error: " + res.status);
        }
        return res.json();
      }

      async function updateFile(path, content, sha, message) {
        const res = await fetch(API_BASE + path, {
          method: "PUT",
          headers: {
            Authorization: authHeader(),
            Accept: "application/vnd.github.v3+json",
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            message,
            content: btoa(unescape(encodeURIComponent(content))),
            sha,
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          if (res.status === 401)
            throw new Error("토큰이 만료되었거나 유효하지 않습니다");
          if (res.status === 403)
            throw new Error(
              "쓰기 권한 부족: Contents → Read and write 필요\n" +
                (err.message || ""),
            );
          if (res.status === 409)
            throw new Error("충돌 발생 — 새로고침 후 다시 시도");
          throw new Error(err.message || "Update failed: " + res.status);
        }
        return res.json();
      }

      // Actions
      async function doAction(action, value) {
        if (!selectedItem) return;
        const id = selectedItem;
        closeSheet();

        const itemEl = document.querySelector(`.item[data-id="${id}"]`);
        if (itemEl) itemEl.classList.add("saving");

        try {
          if (action === "complete") {
            await completeItem(id);
            toast(`${id} 완료 처리됨`, "success");
          } else if (action === "cancel") {
            await cancelItem(id);
            toast(`${id} 취소됨`, "success");
          } else if (action === "urgency") {
            await changeUrgency(id, value);
            toast(`${id} 긴급도 → ${value}`, "success");
          }
          await load();
        } catch (err) {
          toast("오류: " + err.message, "error");
          if (itemEl) itemEl.classList.remove("saving");
        }
      }

      async function completeItem(id) {
        const [activeFile, archiveFile] = await Promise.all([
          getFile(ACTIVE_PATH),
          getFile(ARCHIVE_PATH),
        ]);
        const activeContent = decodeContent(activeFile.content);
        const archiveContent = decodeContent(archiveFile.content);

        const lines = activeContent.split("\n");
        let removedLine = null;
        const newLines = lines.filter((line) => {
          if (line.includes("`" + id + "`")) {
            removedLine = line;
            return false;
          }
          return true;
        });

        if (!removedLine) throw new Error("항목을 찾을 수 없습니다");

        const completedLine = removedLine.replace("- [ ]", "- [x]");
        const now = new Date();
        const monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
        const newArchive = appendToArchive(
          archiveContent,
          monthKey,
          completedLine,
        );

        await updateFile(
          ACTIVE_PATH,
          cleanEmptySections(newLines.join("\n")),
          activeFile.sha,
          `done: ${id}`,
        );
        const archiveFile2 = await getFile(ARCHIVE_PATH);
        await updateFile(
          ARCHIVE_PATH,
          newArchive,
          archiveFile2.sha,
          `archive: ${id} 완료`,
        );
      }

      async function cancelItem(id) {
        const [activeFile, archiveFile] = await Promise.all([
          getFile(ACTIVE_PATH),
          getFile(ARCHIVE_PATH),
        ]);
        const activeContent = decodeContent(activeFile.content);
        const archiveContent = decodeContent(archiveFile.content);

        const lines = activeContent.split("\n");
        let removedLine = null;
        const newLines = lines.filter((line) => {
          if (line.includes("`" + id + "`")) {
            removedLine = line;
            return false;
          }
          return true;
        });

        if (!removedLine) throw new Error("항목을 찾을 수 없습니다");

        const cancelledLine = removedLine.replace(/(.+)/, "$1 (취소)");
        const now = new Date();
        const monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
        const newArchive = appendToArchive(
          archiveContent,
          monthKey,
          cancelledLine,
        );

        await updateFile(
          ACTIVE_PATH,
          cleanEmptySections(newLines.join("\n")),
          activeFile.sha,
          `cancel: ${id}`,
        );
        const archiveFile2 = await getFile(ARCHIVE_PATH);
        await updateFile(
          ARCHIVE_PATH,
          newArchive,
          archiveFile2.sha,
          `archive: ${id} 취소`,
        );
      }

      async function changeUrgency(id, newUrgency) {
        const file = await getFile(ACTIVE_PATH);
        const content = decodeContent(file.content);
        const lines = content.split("\n");
        const newLines = lines.map((line) => {
          if (line.includes("`" + id + "`")) {
            // 4-field: `T-xxx` `#tag` `상` or 3-field: `T-xxx` `상`
            return line.replace(
              /(`T-\d+`\s+(?:`#\S+`\s+)?)`[상중하]`/,
              "$1`" + newUrgency + "`",
            );
          }
          return line;
        });
        await updateFile(
          ACTIVE_PATH,
          newLines.join("\n"),
          file.sha,
          `urgency: ${id} → ${newUrgency}`,
        );
      }

      function decodeContent(b64) {
        return decodeURIComponent(escape(atob(b64.replace(/\n/g, ""))));
      }

      function appendToArchive(archiveContent, monthKey, line) {
        const header = `## ${monthKey}`;
        if (archiveContent.includes(header)) {
          return archiveContent.replace(header, header + "\n" + line);
        }
        return archiveContent.trimEnd() + "\n\n" + header + "\n" + line + "\n";
      }

      function cleanEmptySections(text) {
        const lines = text.split("\n");
        const result = [];
        for (let i = 0; i < lines.length; i++) {
          if (lines[i].startsWith("## ")) {
            let hasItems = false;
            for (let j = i + 1; j < lines.length; j++) {
              if (lines[j].startsWith("## ")) break;
              if (lines[j].startsWith("- [")) {
                hasItems = true;
                break;
              }
            }
            if (!hasItems) {
              while (
                i + 1 < lines.length &&
                !lines[i + 1].startsWith("## ") &&
                !lines[i + 1].startsWith("# ")
              )
                i++;
              continue;
            }
          }
          result.push(lines[i]);
        }
        return result.join("\n");
      }

      // Read: unauthenticated API (public repo, no token needed)
      // Write: token required (complete/cancel/urgency)
      async function fetchRaw(path) {
        try {
          const res = await fetch(API_BASE + path + "?t=" + Date.now(), {
            headers: { Accept: "application/vnd.github.v3.raw" },
          });
          if (res.ok) return res.text();
        } catch (e) {
          /* fallback */
        }
        const res = await fetch(
          `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${path}?t=${Date.now()}`,
        );
        if (!res.ok) throw new Error("Fetch error: " + res.status);
        return res.text();
      }

      async function load() {
        const btn = document.getElementById("refreshBtn");
        btn.classList.add("loading");
        try {
          const [activeText, archiveText] = await Promise.all([
            fetchRaw(ACTIVE_PATH),
            fetchRaw(ARCHIVE_PATH),
          ]);

          const ap = parseMd(activeText);
          activeData = {
            raw: activeText,
            sections: ap.sections,
            count: ap.count,
          };
          const arp = parseMd(archiveText);
          archiveData = {
            raw: archiveText,
            sections: arp.sections,
            count: arp.count,
          };

          document.getElementById("badgeActive").textContent = ap.count;
          document.getElementById("badgeArchive").textContent = arp.count;

          renderCurrent();
          document.getElementById("syncInfo").textContent =
            new Date().toLocaleTimeString("ko-KR", {
              hour: "2-digit",
              minute: "2-digit",
            });
        } catch (e) {
          document.getElementById("syncInfo").textContent = "offline";
        }
        btn.classList.remove("loading");
      }

      // Init
      updateTokenDot();
      load();
      setInterval(load, AUTO_REFRESH);
    </script>
  </body>
</html>
